# Solar Flare Catalog Summary
# Compiled from GOES, Solar Orbiter and SWPC records for GenesisAeon Package 21.
#
# Notable events used for benchmark validation:
#   - Solar Orbiter close pass: 30 Sept 2024 (magnetic avalanche capture)
#   - ESA CryoSat/Swarm X-class storm: Jan–Feb 2026
#   - Velasco Herrera 2026 superflare window prediction: 2025–2026

metadata:
  package: 21
  name: "solar-flare-utac"
  version: "0.1.0"
  notes: "Summary statistics for benchmark validation, not full event lists."

notable_events:
  - id: "SOL2024-09-30"
    goes_class: "X3.7"
    active_region: "AR13848"
    description: "Solar Orbiter magnetic avalanche capture (30 Sept 2024)"
    reference: "Solar Orbiter / A&A 2026"
    utac_relevance: "Confirmed magnetic reconnection cascade as predicted by Γ > θ_PT"

  - id: "SOL2026-01"
    goes_class: "X5+"
    description: "X-class geomagnetic storm captured by CryoSat + Swarm (Jan 2026)"
    reference: "ESA CryoSat + Swarm 2026"
    dst_peak_nT: -180
    storm_class: "intense"

  - id: "SOL2003-11-04"
    goes_class: "X28"
    active_region: "AR10486"
    description: "Largest recorded GOES flare (off-scale at X28)"
    utac_relevance: "Extreme tail of power-law energy distribution"

benchmark_targets:
  gamma_solar:
    value: 0.014
    tolerance: 0.005
    description: "CREP Γ for solar active regions (Package 21 central result)"
    derivation: "arctanh(eta=0.03) / sigma=2.2"

  xclass_energy_J:
    value: 1.0e32
    tolerance_log: 0.5
    description: "Active region maximum magnetic energy [model units]"

  power_law_index:
    value: 1.8
    tolerance: 0.1
    description: "Flare energy spectrum exponent α (Velasco Herrera 2026)"

  reconnection_timescale_min:
    value: 10.0
    tolerance: 0.30
    description: "Typical Sweet-Parker reconnection time in corona"

  flare_frequency_per_cycle:
    value: 150
    tolerance: 0.20
    description: "X-class flares per 11-year solar cycle (model calibration)"

crep_spectrum_position:
  domain: "Solar Flare"
  package: 21
  gamma: 0.014
  eta: "1%"
  character: "Ultra-sensitive (barely supercritical)"
  comparison:
    amoc_gamma: 0.251
    amazon_gamma: 0.116
    neural_gamma: 0.251
    cygnus_gamma: 0.046
    note: >
      Solar active regions have the LOWEST Γ in the GenesisAeon atlas,
      explaining the extreme difficulty of deterministic flare prediction.
      Tiny CREP fluctuations translate to giant energy releases.
